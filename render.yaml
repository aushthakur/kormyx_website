services:
  # Backend Web Service
  - type: web
    name: kormyx-backend
    env: node
    region: oregon
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: MONGO_URI
        sync: false # Requires manual entry in the Render dashboard

  # Frontend Static Site
  - type: web
    name: kormyx-frontend
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: kormyx-backend
          envVarKey: RENDER_EXTERNAL_URL
